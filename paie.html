<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Paiements</title>
    <link rel="stylesheet" href="assets/css/paie.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="phone">
      <div class="notch"></div>

      <div class="statusbar">
        <span>07:30 AM</span>
        <div class="statusbar-right">
          <svg
            width="16"
            height="12"
            viewBox="0 0 16 12"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path d="M8 3C10.5 3 12.7 4.1 14.2 5.9" />
            <path d="M1.8 5.9C3.3 4.1 5.5 3 8 3" />
            <path d="M5.5 7.5C6.3 6.6 7.1 6 8 6C8.9 6 9.7 6.6 10.5 7.5" />
            <circle cx="8" cy="10" r="1" fill="currentColor" />
          </svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
            <rect x="0" y="3" width="3" height="9" rx="1" />
            <rect x="4.5" y="2" width="3" height="10" rx="1" />
            <rect x="9" y="0" width="3" height="12" rx="1" />
            <rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".3" />
          </svg>
          <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor">
            <rect
              x="0"
              y="1"
              width="22"
              height="10"
              rx="3"
              stroke="currentColor"
              stroke-width="1"
              fill="none"
            />
            <rect x="1.5" y="2.5" width="17" height="7" rx="2" />
            <rect x="22.5" y="4" width="2" height="4" rx="1" />
          </svg>
        </div>
      </div>

      <div class="header">
        <div class="back-btn">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 12H5M12 5l-7 7 7 7" />
          </svg>
        </div>
        <div class="header-title">Paiements</div>
      </div>

      <div class="content">
        <div class="montant-box">
          <span class="montant-label">Montant</span>
          <span class="montant-value">2500 Fcfa</span>
        </div>

        <div class="mobile-money-box" id="mobile-section">
          <div class="mobile-money-header" onclick="selectMethod('mobile')">
            <span class="mobile-money-title">Par mobile money</span>
            <div class="radio-dot" id="radio-mobile"></div>
          </div>
          <div class="phone-input-row">
            <span class="phone-prefix">+225 0#</span>
            <span class="phone-dots">## ## ## ##</span>
          </div>
          <div class="operator-icons">
            <div class="op-icon" style="background: #1a2b6b">
              <img src="assets/img/images.png" alt="" class="img" />
            </div>
            <div class="op-icon" style="background: #ff6600">
              <img src="assets/img/MOOV-MONEY.png" alt="" class="img" />
            </div>
            <div class="op-icon" style="background: #ffcc00">
              <img src="assets/img/mtn.jfif" alt="" class="img" />
            </div>
            <div class="op-icon" style="background: #e63312">
              <img src="assets/img/org.jfif" alt="" class="img" />
            </div>
          </div>
        </div>

        <div class="pay-option" id="opt-visa" onclick="selectMethod('visa')">
          <div class="pay-option-left">
            <div class="pay-logo"><div class="visa-logo">VISA</div></div>
            <span class="pay-name">Visa</span>
          </div>
          <div class="radio-empty" id="radio-visa"></div>
        </div>

        <div
          class="pay-option"
          id="opt-mastercard"
          onclick="selectMethod('mastercard')"
        >
          <div class="pay-option-left">
            <div class="pay-logo">
              <div class="mc-logo">
                <div class="mc-red"></div>
                <div class="mc-yellow"></div>
              </div>
            </div>
            <span class="pay-name">Mastercard</span>
          </div>
          <div class="radio-empty" id="radio-mastercard"></div>
        </div>

        <div
          class="pay-option"
          id="opt-paypal"
          onclick="selectMethod('paypal')"
        >
          <div class="pay-option-left">
            <div class="pay-logo">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M7 4h7a5 5 0 010 10H9l-1 6H5L7 4z" fill="#009cde" />
                <path d="M9 4h6a5 5 0 010 10h-5l-1 6H6L9 4z" fill="#003087" />
              </svg>
            </div>
            <span class="pay-name">PayPal</span>
          </div>
          <div class="radio-empty" id="radio-paypal"></div>
        </div>

        <div
          class="pay-option"
          id="opt-applepay"
          onclick="selectMethod('applepay')"
        >
          <div class="pay-option-left">
            <div class="pay-logo">
              <svg width="20" height="24" viewBox="0 0 814 1000" fill="#1a1a1a">
                <path
                  d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-120.8c-48.1-78.5-87.1-200.2-87.1-315.6 0-199.3 130.4-304.6 258.4-304.6 63.5 0 116.4 41.8 155.9 41.8 37.7 0 97.3-43.5 166.1-43.5 25.8 0 108.2 2.6 168.6 80.2zm-80.3-171.7c31.3-37.5 53.7-89.1 53.7-140.8 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.9-55.1 136.2 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 134.9-70.5z"
                />
              </svg>
            </div>
            <span class="pay-name">Apple Pay</span>
          </div>
          <div class="radio-empty" id="radio-applepay"></div>
        </div>

        <div class="add-card">
          <div class="add-card-icon">+</div>
          <span class="add-card-label">Ajouter une nouvelle carte</span>
        </div>

        <div style="height: 16px"></div>
      </div>

      <div class="cta-wrap">
        <button class="cta-btn" id="cta-btn">Confirmer</button>
      </div>
    </div>

    <script src="assets/js/paie.js"></script>
  </body>
</html>
