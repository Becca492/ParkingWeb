<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="assets/css/connexion.css" rel="stylesheet">

<title>ParKing - Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span class="status-time">07:30 AM</span>
    <div class="dynamic-island"></div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><rect x="1" y="13" width="3" height="8" rx="1"/><rect x="6" y="9" width="3" height="12" rx="1"/><rect x="11" y="5" width="3" height="16" rx="1"/><rect x="16" y="1" width="3" height="20" rx="1" opacity="0.3"/></svg>
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <svg viewBox="0 0 24 24"><rect x="1" y="7" width="18" height="11" rx="2" stroke="#111" stroke-width="1.5" fill="none"/><rect x="2.5" y="8.5" width="14" height="8" rx="1" fill="#111"/><path d="M20 10v5a2 2 0 000-5z"/></svg>
    </div>
  </div>

 
  <div class="content">

    
    <div class="header">
<img src="assets/img/LOGO.svg" alt="Logo Parking" width="100" height="100">

    </div>


    <div class="form-group">
      <label class="form-label">Numero de telephone</label>
      <input class="form-input" type="tel" placeholder="Manuella Ekra">
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" placeholder="hello@reallygreatsite.com">
    </div>

    <div class="form-group">
      <label class="form-label">Matricule du vehicule</label>
      <input class="form-input" type="text" placeholder="4526-JF-01">
    </div>

    <div class="form-group">
      <label class="form-label">Mot de passe</label>
      <input class="form-input" type="password" placeholder="••••••••">
    </div>

    <div class="remember">
      <input type="radio" class="remember-radio" id="remember">
      <label class="remember-label" for="remember">Se souvenir de moi</label>
    </div>

    <button class="btn-connexion">Connexion</button>

    
    <div class="arrow-wrapper">
      <div class="arrow">
        <div class="arrow-line"></div>
        <div class="arrow-head"></div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
